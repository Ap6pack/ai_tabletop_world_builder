name: Release

# Publish the API and frontend container images to the GitHub Container
# Registry (GHCR) when a version tag is pushed. Authentication uses the
# built-in GITHUB_TOKEN, so no registry secrets need to be configured.
#
# Images (public once the packages are set to public in the repo settings):
#   ghcr.io/<owner>/ai-tabletop-api
#   ghcr.io/<owner>/ai-tabletop-frontend
#
# Tags produced for a push of v1.2.3 (non-prerelease): 1.2.3, 1.2, 1, latest.
#
# workflow_dispatch lets you backfill a tag that was released before this
# workflow existed: run it manually and pick the tag (e.g. v1.0.0) as the ref.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ai-tabletop-api
            dockerfile: Dockerfile
          - image: ai-tabletop-frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
