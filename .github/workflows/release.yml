name: Release

# Publish the API and frontend container images to the GitHub Container
# Registry (GHCR) for a version tag. Authentication uses the built-in
# GITHUB_TOKEN, so no registry secrets need to be configured.
#
# Images (make the packages public in repo settings after the first run):
#   ghcr.io/<owner>/ai-tabletop-api
#   ghcr.io/<owner>/ai-tabletop-frontend
#
# Tags produced for version 1.2.3: 1.2.3, 1.2, 1, latest.
#
# Triggers:
#   - push of a v* tag  -> publishes that tag's images automatically.
#   - workflow_dispatch -> pass an existing tag (e.g. v1.0.0) to build and
#     publish it. Use this to backfill a tag released before this workflow
#     existed; run it from the default branch (that is where this file lives).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build and publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ai-tabletop-api
            dockerfile: Dockerfile
          - image: ai-tabletop-frontend
            dockerfile: Dockerfile.frontend
    steps:
      - name: Resolve version and ref
        id: v
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${REF#v}"
          if [ -z "$VER" ]; then
            echo "::error::Could not resolve a version (ref='$REF')."
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # Only cascade major/minor/latest for a clean X.Y.Z release.
          if echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "minor=${VER%.*}" >> "$GITHUB_OUTPUT"
            echo "major=${VER%%.*}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.v.outputs.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.v.outputs.version }}
            type=raw,value=${{ steps.v.outputs.minor }},enable=${{ steps.v.outputs.minor != '' }}
            type=raw,value=${{ steps.v.outputs.major }},enable=${{ steps.v.outputs.major != '' }}
            type=raw,value=latest,enable=${{ steps.v.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
