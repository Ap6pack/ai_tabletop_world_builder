name: CD

on:
  push:
    tags: ["v*"]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY }}/ai-tabletop-api:${{ github.ref_name }}
            ${{ vars.REGISTRY }}/ai-tabletop-api:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ vars.REGISTRY }}/ai-tabletop-frontend:${{ github.ref_name }}
            ${{ vars.REGISTRY }}/ai-tabletop-frontend:staging

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Running smoke tests against staging..."
          curl -sf "${{ vars.STAGING_URL }}/health" || exit 1
          echo "Health check passed"

  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY }}/ai-tabletop-api:${{ github.ref_name }}
            ${{ vars.REGISTRY }}/ai-tabletop-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ vars.REGISTRY }}/ai-tabletop-frontend:${{ github.ref_name }}
            ${{ vars.REGISTRY }}/ai-tabletop-frontend:latest
