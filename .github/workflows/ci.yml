name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest --tb=short -q

  test-postgres:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wargame
          POSTGRES_PASSWORD: wargame
          POSTGRES_DB: wargame_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wargame -d wargame_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio
      - name: Run the suite against PostgreSQL
        env:
          TEST_DATABASE_URL: postgresql+psycopg://wargame:wargame@localhost:5432/wargame_test
        run: python -m pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: [test, test-postgres]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-tabletop-world-builder:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: ai-tabletop-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
