services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Use the bundled Postgres and Redis services by default. These override
      # any DATABASE_URL/REDIS_URL from .env so the stack is Postgres-backed
      # out of the box.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wargame}:${POSTGRES_PASSWORD:-wargame}@postgres:5432/${POSTGRES_DB:-wargame}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./scenarios:/app/scenarios
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_HOST: api
      API_PORT: "8000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wargame}
      POSTGRES_USER: ${POSTGRES_USER:-wargame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wargame}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wargame} -d ${POSTGRES_DB:-wargame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  pgdata:
